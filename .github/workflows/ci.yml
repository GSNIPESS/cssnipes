name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: cssnipes
          POSTGRES_PASSWORD: cssnipes
          POSTGRES_DB: cssnipes
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cssnipes"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://cssnipes:cssnipes@localhost:5432/cssnipes?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx prisma db seed

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Unit tests
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
